<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Transfer File via Vercel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.2rem;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        .card-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 600;
            background: rgba(0,0,0,0.2);
        }
        .card-body { padding: 1.2rem; }
        .upload-zone {
            border: 2px dashed #3b82f6;
            border-radius: 0.8rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .file-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .file-item {
            background: rgba(0,0,0,0.3);
            border-radius: 0.6rem;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .btn-copy {
            background: #3b82f6;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 0.4rem;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-cloud-upload-alt"></i> FileShare</h1>
        <p>Upload & bagikan file via link</p>
    </div>

    <div class="card">
        <div class="card-header"><i class="fas fa-upload"></i> Upload File</div>
        <div class="card-body">
            <div class="upload-zone" id="uploadZone">
                <i class="fas fa-cloud-upload-alt" style="font-size:2rem;"></i>
                <div>Klik atau tarik file ke sini</div>
                <small>Maks 10MB (Vercel Blob limit)</small>
                <input type="file" id="fileInput" style="display:none">
            </div>
            <div id="uploadStatus"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><i class="fas fa-list"></i> File Tersimpan</div>
        <div class="card-body">
            <div id="fileList" class="file-list">
                <div style="text-align:center; color:#475569;">Loading...</div>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isError ? '#7f1a1a' : '#1e293b';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }

    async function loadFiles() {
        try {
            const res = await fetch('/api/files');
            const data = await res.json();
            if (data.success) {
                renderFiles(data.files);
            }
        } catch (err) {
            document.getElementById('fileList').innerHTML = '<div style="text-align:center; color:#ef4444;">Gagal load file</div>';
        }
    }

    function renderFiles(files) {
        const container = document.getElementById('fileList');
        if (!files.length) {
            container.innerHTML = '<div style="text-align:center; color:#475569;">Belum ada file</div>';
            return;
        }
        container.innerHTML = files.map(file => `
            <div class="file-item">
                <div style="flex:1; overflow:hidden;">
                    <div><i class="fas fa-file"></i> ${file.name.substring(0, 40)}</div>
                    <div style="font-size:0.6rem; color:#64748b;">${(file.size/1024).toFixed(1)} KB</div>
                    <div style="display:flex; gap:0.5rem; margin-top:0.3rem;">
                        <a href="${file.url}" target="_blank" style="color:#60a5fa;">Download</a>
                        <button class="btn-copy" data-url="${file.url}">Copy Link</button>
                    </div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.btn-copy').forEach(btn => {
            btn.addEventListener('click', () => {
                const url = btn.getAttribute('data-url');
                navigator.clipboard.writeText(url);
                showToast('Link tersalin!');
            });
        });
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        const statusDiv = document.getElementById('uploadStatus');
        statusDiv.innerHTML = '<div style="text-align:center; margin-top:0.5rem;"><i class="fas fa-spinner fa-pulse"></i> Uploading...</div>';
        
        try {
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                showToast(`Upload berhasil: ${data.originalName}`);
                loadFiles();
                statusDiv.innerHTML = '';
            } else {
                showToast(data.error || 'Upload gagal', true);
                statusDiv.innerHTML = '';
            }
        } catch (err) {
            showToast('Error koneksi', true);
            statusDiv.innerHTML = '';
        }
    }

    const zone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    zone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) uploadFile(e.target.files[0]);
    });
    zone.addEventListener('dragover', (e) => e.preventDefault());
    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
    });

    loadFiles();
</script>
</body>
</html>
