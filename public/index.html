<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileUpload - Upload & Dapatkan Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2rem;
            text-align: center;
        }
        .upload-zone {
            border: 2px dashed #3b82f6;
            border-radius: 1rem;
            padding: 2rem;
            margin: 1.5rem 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-zone:hover { background: rgba(59,130,246,0.1); }
        .result {
            background: rgba(0,0,0,0.4);
            border-radius: 0.8rem;
            padding: 0.8rem;
            margin-top: 1rem;
            word-break: break-all;
            display: none;
        }
        .btn {
            background: #3b82f6;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="card">
    <h1><i class="fas fa-cloud-upload-alt"></i> FileUpload</h1>
    <p>Upload file → Dapatkan link langsung</p>

    <div class="upload-zone" id="uploadZone">
        <i class="fas fa-arrow-up" style="font-size:2rem;"></i>
        <div>Klik atau tarik file ke sini</div>
        <small>Maks 512MB · 0x0.st</small>
        <input type="file" id="fileInput" style="display:none">
    </div>

    <div id="loading" style="display:none;">
        <i class="fas fa-spinner fa-pulse"></i> Uploading...
    </div>

    <div class="result" id="result">
        <div style="font-size:0.8rem;">Link file kamu:</div>
        <div id="link" style="margin:0.5rem 0; font-size:0.7rem;"></div>
        <button class="btn" id="copyBtn">Salin Link</button>
        <button class="btn" id="resetBtn" style="background:#334155; margin-left:0.5rem;">Upload Lagi</button>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isError ? '#7f1a1a' : '#1e293b';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }

    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        
        try {
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('link').innerText = data.url;
                document.getElementById('result').style.display = 'block';
                showToast('Upload berhasil!');
            } else {
                showToast(data.error || 'Upload gagal', true);
            }
        } catch (err) {
            showToast('Error koneksi ke server', true);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    const zone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    
    zone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) uploadFile(e.target.files[0]);
    });
    
    zone.addEventListener('dragover', (e) => e.preventDefault());
    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
    });
    
    document.getElementById('copyBtn').addEventListener('click', () => {
        const link = document.getElementById('link').innerText;
        if (link) {
            navigator.clipboard.writeText(link);
            showToast('Link tersalin!');
        }
    });
    
    document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('result').style.display = 'none';
        fileInput.value = '';
        showToast('Siap upload file baru');
    });
</script>
</body>
</html>
