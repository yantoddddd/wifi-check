<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Link Pendek</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            font-family: system-ui, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin-bottom: 10px; font-size: 1.8rem; }
        .sub { color: #94a3b8; margin-bottom: 20px; font-size: 0.8rem; }
        .upload-zone {
            border: 2px dashed #3b82f6;
            border-radius: 20px;
            padding: 40px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-zone:hover { background: rgba(59,130,246,0.1); }
        .loading { display: none; margin: 20px 0; }
        .result {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            word-break: break-all;
        }
        .link-box {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 0.7rem;
            font-family: monospace;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #2563eb; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .file-list { margin-top: 20px; text-align: left; }
        .file-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-item a { color: #60a5fa; text-decoration: none; }
        .delete-btn { background: #ef4444; padding: 4px 12px; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="card">
    <h1>📤 FileShare</h1>
    <div class="sub">Upload file → dapatkan link pendek</div>
    
    <div class="upload-zone" id="uploadZone">
        <div>📁 Klik atau tarik file ke sini</div>
        <small style="color:#64748b;">Maksimal 50MB</small>
        <input type="file" id="fileInput" style="display:none">
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div> Uploading...
    </div>
    
    <div class="result" id="result">
        <div style="color:#10b981;">✅ Upload Berhasil!</div>
        <div class="link-box" id="link"></div>
        <button onclick="copyLink()">📋 Salin Link</button>
        <button onclick="resetForm()">⬆️ Upload Lagi</button>
    </div>
    
    <div class="file-list" id="fileList"></div>
</div>
<div id="toast" class="toast"></div>

<script>
    let currentUrl = '';
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }
    
    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        
        try {
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.success) {
                currentUrl = data.url;
                document.getElementById('link').innerHTML = `<a href="${data.url}" target="_blank">${data.url}</a>`;
                document.getElementById('result').style.display = 'block';
                showToast('Upload berhasil!');
                loadFiles();
            } else {
                showToast('Upload gagal: ' + (data.error || 'Unknown error'));
            }
        } catch (err) {
            showToast('Error: ' + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
    
    function copyLink() {
        if (currentUrl) {
            navigator.clipboard.writeText(currentUrl);
            showToast('Link tersalin!');
        }
    }
    
    function resetForm() {
        document.getElementById('result').style.display = 'none';
        document.getElementById('fileInput').value = '';
        showToast('Siap upload file baru');
    }
    
    async function loadFiles() {
        try {
            const res = await fetch('/api/files');
            const files = await res.json();
            const container = document.getElementById('fileList');
            
            if (!files.length) {
                container.innerHTML = '<div style="text-align:center; color:#475569; margin-top:20px;">Belum ada file</div>';
                return;
            }
            
            container.innerHTML = files.map(file => `
                <div class="file-item">
                    <div style="flex:1;">
                        <div><a href="/f/${file.id}" target="_blank">${file.name}</a></div>
                        <small style="color:#64748b;">${(file.size/1024).toFixed(1)} KB</small>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error(err);
        }
    }
    
    // Event listeners
    const zone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    
    zone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) uploadFile(e.target.files[0]);
    });
    
    zone.addEventListener('dragover', (e) => e.preventDefault());
    zone.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
    });
    
    loadFiles();
</script>
</body>
</html>
